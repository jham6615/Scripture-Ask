# Supabase project config (used by the CLI). Link with:
#   supabase link --project-ref gkwcekrthkkumwfztlln
project_id = "gkwcekrthkkumwfztlln"

# The AI proxy is called with the app's publishable key, not a user JWT, so skip JWT verification.
# (Add real abuse protection — rate limiting / auth gating — before a public launch.)
[functions.ai]
verify_jwt = false

# Stripe calls this webhook directly (no Supabase JWT); we verify the Stripe signature inside instead.
[functions.stripe-webhook]
verify_jwt = false

# create-checkout intentionally keeps verify_jwt = true (the default): it requires a signed-in user,
# whose JWT supabase.functions.invoke attaches automatically.
